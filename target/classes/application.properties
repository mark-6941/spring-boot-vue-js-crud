# 1. 換成 H2，它會自動在 Java 執行時「直接在記憶體裡開庫」，完全不用在 Windows 安裝任何軟體！
spring.datasource.url=jdbc:h2:mem:rentaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. 自動在記憶體裡建立與更新 Tutorial 資料表
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# 3. 開啟 H2 控制台（等一下可以用 http://localhost:8080/h2-console 進去看資料）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console